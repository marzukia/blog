baseURL = "https://mrzk.io/"
defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 2

[pagination]
  pagerSize = 15

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params.article]
  showComments = true

[services]
  [services.x]
    disableInlineCSS = true

  [services.googleAnalytics]
    id = 'G-F52W3SZVZ4'

[params]
  [params.githubPages]
    enabled = true

[params.comments]
  enable = true
  provider = "giscus"
  [params.comments.giscus]
    repo = "marzukia/blog-comments"
    repoId = "R_kgDOTUFlxA"
    category = "General"
    categoryId = "DIC_kwDOTUFlxM4DA4Q_"
    mapping = "pathname"
    reactionsEnabled = true
    emitMetadata = false
    inputPosition = "bottom"
    theme = "light"
    lang = "en"
    strict = false
    loading = "lazy"
